<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>黄金价格走势图 - 黄金一周内走势</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }

        .btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chart-wrapper {
            position: relative;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .price-info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 黄金价格走势图</h1>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
        </div>

        <div id="content" style="display: none;">
            <!-- 黄金价格类型切换 -->
            <div class="controls">
                <div class="control-group">
                    <span class="control-label">黄金价格类型：</span>
                    <button class="btn active" onclick="switchPriceType('international')">国际黄金 (USD/oz)</button>
                    <button class="btn" onclick="switchPriceType('china')">中国现货黄金 (¥/克)</button>
                </div>
            </div>

            <!-- K线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">K线图（蜡烛图）</div>
                <div class="controls">
                    <button class="btn" onclick="switchTimeframe('6h')">6小时</button>
                    <button class="btn active" onclick="switchTimeframe('1d')">1天</button>
                    <button class="btn" onclick="switchTimeframe('3d')">3天</button>
                    <button class="btn" onclick="switchTimeframe('7d')">7天</button>
                </div>
                <div class="chart-container" id="candleChartContainer">
                    <canvas id="candleChart"></canvas>
                    <div class="tooltip" id="tooltip"></div>
                </div>
            </div>

            <!-- 价格线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">时分线（价格趋势）</div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 分析指标折线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">分析指标折线图</div>
                <div class="indicators">
                    <button class="btn active" onclick="toggleIndicator('ma5')">MA5</button>
                    <button class="btn active" onclick="toggleIndicator('ma10')">MA10</button>
                    <button class="btn active" onclick="toggleIndicator('ma20')">MA20</button>
                    <button class="btn" onclick="toggleIndicator('rsi')">RSI</button>
                </div>
                <div class="chart-container">
                    <canvas id="indicatorChart"></canvas>
                </div>
            </div>

            <div class="price-info" id="priceInfo">
                当前价格: $0.00 | 涨跌: +0.00% | 时间: --
            </div>
        </div>
    </div>

    <script>
        // 生成逼真的模拟数据
        function generateMockData(timeframe, priceType) {
            const now = new Date();
            const data = [];
            
            // 根据价格类型设置基础价格
            let basePrice = priceType === 'international' ? (2050 + Math.random() * 50) : (430 + Math.random() * 20);
            
            const intervals = {
                '6h': { points: 72, step: 5 * 60 * 1000 },
                '1d': { points: 288, step: 5 * 60 * 1000 },
                '3d': { points: 432, step: 10 * 60 * 1000 },
                '7d': { points: 672, step: 15 * 60 * 1000 }
            };
            
            const config = intervals[timeframe] || intervals['1d'];
            
            for (let i = config.points; i >= 0; i--) {
                const timestamp = now.getTime() - i * config.step;
                const date = new Date(timestamp);
                
                const randomWalk = (Math.random() - 0.5) * 2;
                const trend = (Math.random() - 0.5) * 0.3;
                const volatility = (Math.random() - 0.5) * 1.5;
                
                basePrice = basePrice + randomWalk + trend;
                
                const open = basePrice;
                const close = basePrice + volatility;
                const high = Math.max(open, close) + Math.abs(Math.random()) * 0.8;
                const low = Math.min(open, close) - Math.abs(Math.random()) * 0.8;
                
                data.push({
                    date: date,
                    timestamp: timestamp,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                    volume: Math.random() * 1000000
                });
            }
            
            return data;
        }

        // 计算移动平均线
        function calculateMA(data, period) {
            const ma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j].close;
                    }
                    ma.push(parseFloat((sum / period).toFixed(2)));
                }
            }
            return ma;
        }

        // 计算RSI
        function calculateRSI(data, period = 14) {
            const rsi = [];
            
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    rsi.push(null);
                } else {
                    let gains = 0;
                    let losses = 0;
                    
                    for (let j = 1; j <= period; j++) {
                        const change = data[i - j + 1].close - data[i - j].close;
                        if (change > 0) {
                            gains += change;
                        } else {
                            losses += Math.abs(change);
                        }
                    }
                    
                    const avgGain = gains / period;
                    const avgLoss = losses / period;
                    
                    if (avgLoss === 0) {
                        rsi.push(avgGain === 0 ? 50 : 100);
                    } else {
                        const rs = avgGain / avgLoss;
                        rsi.push(parseFloat((100 - (100 / (1 + rs))).toFixed(2)));
                    }
                }
            }
            
            return rsi;
        }

        let candleChart = null;
        let priceChart = null;
        let indicatorChart = null;
        let currentData = [];
        let currentTimeframe = '1d';
        let currentPriceType = 'international';
        let currentIndicators = {
            ma5: true,
            ma10: true,
            ma20: true,
            rsi: false
        };

        // 绘制蜡烛图 (Canvas绘制)
        function createCandlestickChart(data) {
            const canvas = document.getElementById('candleChart');
            const ctx = canvas.getContext('2d');
            
            // 设置canvas宽高
            const container = document.getElementById('candleChartContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // 清空canvas
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (data.length === 0) return;

            // 计算价格范围
            let minPrice = Math.min(...data.map(d => d.low));
            let maxPrice = Math.max(...data.map(d => d.high));
            const priceRange = maxPrice - minPrice;
            minPrice -= priceRange * 0.1;
            maxPrice += priceRange * 0.1;

            // 绘图参数
            const padding = 50;
            const plotWidth = canvas.width - padding * 2;
            const plotHeight = canvas.height - padding * 2;
            const candleWidth = Math.max(2, plotWidth / data.length - 2);

            // 绘制背景网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (plotHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
            }

            // 绘制蜡烛
            data.forEach((candle, idx) => {
                const x = padding + (plotWidth / data.length) * idx + (plotWidth / data.length - candleWidth) / 2;
                
                // 转换价格到Y坐标
                const toY = (price) => canvas.height - padding - ((price - minPrice) / (maxPrice - minPrice)) * plotHeight;
                
                const y_open = toY(candle.open);
                const y_close = toY(candle.close);
                const y_high = toY(candle.high);
                const y_low = toY(candle.low);
                
                const isUp = candle.close >= candle.open;
                const color = isUp ? '#FF3B30' : '#4CAF50'; // 红涨绿跌

                // 绘制高低线 (影线)
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, y_high);
                ctx.lineTo(x + candleWidth / 2, y_low);
                ctx.stroke();

                // 绘制蜡烛 (实体)
                const bodyTop = Math.min(y_open, y_close);
                const bodyHeight = Math.abs(y_close - y_open);
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, candleWidth, Math.max(bodyHeight, 2));
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.strokeRect(x, bodyTop, candleWidth, Math.max(bodyHeight, 2));

                // 保存蜡烛数据用于鼠标交互
                candle.x = x;
                candle.y_open = y_open;
                candle.y_close = y_close;
                candle.candleWidth = candleWidth;
            });

            // 绘制Y轴标签
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const price = minPrice + (maxPrice - minPrice) * (i / 5);
                const y = canvas.height - padding - (plotHeight / 5) * i;
                ctx.fillText(price.toFixed(0), padding - 10, y + 4);
            }

            // 绘制X轴标签
            ctx.textAlign = 'center';
            for (let i = 0; i < data.length; i += Math.ceil(data.length / 10)) {
                const x = padding + (plotWidth / data.length) * i + (plotWidth / data.length) / 2;
                const date = data[i].date;
                const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                ctx.fillText(timeStr, x, canvas.height - 10);
            }

            // 添加鼠标事件
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const tooltip = document.getElementById('tooltip');

                for (let candle of data) {
                    if (mouseX >= candle.x && mouseX <= candle.x + candle.candleWidth) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = mouseX + 'px';
                        tooltip.style.top = '10px';
                        tooltip.innerHTML = `
                            开: $${candle.open.toFixed(2)}<br>
                            高: $${candle.high.toFixed(2)}<br>
                            低: $${candle.low.toFixed(2)}<br>
                            收: $${candle.close.toFixed(2)}<br>
                            时间: ${candle.date.toLocaleTimeString('zh-CN')}
                        `;
                        return;
                    }
                }
                tooltip.style.display = 'none';
            });

            canvas.addEventListener('mouseleave', () => {
                document.getElementById('tooltip').style.display = 'none';
            });

            updatePriceInfo(data[data.length - 1]);
        }

        // 创建价格线图
        function createPriceChart(data) {
            const ctx = document.getElementById('priceChart');
            if (!ctx) return;
            
            if (priceChart) {
                priceChart.destroy();
            }

            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            const closePrices = data.map(d => d.close);

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收盘价',
                            data: closePrices,
                            borderColor: 'rgba(102, 126, 234, 1)',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 2,
                            pointBackgroundColor: 'rgba(102, 126, 234, 1)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: currentPriceType === 'international' ? '价格 (USD/oz)' : '价格 (¥/克)'
                            }
                        }
                    }
                }
            });
        }

        // 创建指标折线图
        function createIndicatorChart(data) {
            const ctx = document.getElementById('indicatorChart');
            if (!ctx) return;
            
            if (indicatorChart) {
                indicatorChart.destroy();
            }

            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            const datasets = [];
            const colors = {
                ma5: { border: 'rgba(59, 130, 246, 1)', bg: 'rgba(59, 130, 246, 0.1)' },
                ma10: { border: 'rgba(249, 115, 22, 1)', bg: 'rgba(249, 115, 22, 0.1)' },
                ma20: { border: 'rgba(168, 85, 247, 1)', bg: 'rgba(168, 85, 247, 0.1)' },
                rsi: { border: 'rgba(236, 72, 153, 1)', bg: 'rgba(236, 72, 153, 0.1)' }
            };

            if (currentIndicators.ma5) {
                const ma5 = calculateMA(data, 5);
                datasets.push({
                    label: 'MA5',
                    data: ma5,
                    borderColor: colors.ma5.border,
                    backgroundColor: colors.ma5.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma5.border
                });
            }

            if (currentIndicators.ma10) {
                const ma10 = calculateMA(data, 10);
                datasets.push({
                    label: 'MA10',
                    data: ma10,
                    borderColor: colors.ma10.border,
                    backgroundColor: colors.ma10.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma10.border
                });
            }

            if (currentIndicators.ma20) {
                const ma20 = calculateMA(data, 20);
                datasets.push({
                    label: 'MA20',
                    data: ma20,
                    borderColor: colors.ma20.border,
                    backgroundColor: colors.ma20.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma20.border
                });
            }

            if (currentIndicators.rsi) {
                const rsi = calculateRSI(data, 14);
                datasets.push({
                    label: 'RSI (右轴)',
                    data: rsi,
                    borderColor: colors.rsi.border,
                    backgroundColor: colors.rsi.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.rsi.border,
                    yAxisID: 'y1'
                });
            }

            indicatorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '价格'
                            },
                            beginAtZero: false
                        },
                        y1: {
                            type: 'linear',
                            display: currentIndicators.rsi,
                            position: 'right',
                            title: {
                                display: currentIndicators.rsi,
                                text: 'RSI'
                            },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }

        // 切换黄金价格类型
        function switchPriceType(type) {
            currentPriceType = type;
            
            // 更新按钮状态
            document.querySelectorAll('.control-group .btn').forEach(btn => {
                btn.classList.remove('active');
                if ((type === 'international' && btn.textContent.includes('国际')) ||
                    (type === 'china' && btn.textContent.includes('中国'))) {
                    btn.classList.add('active');
                }
            });

            // 重新生成数据并更新图表
            currentData = generateMockData(currentTimeframe, type);
            createCandlestickChart(currentData);
            createPriceChart(currentData);
            createIndicatorChart(currentData);
        }

        // 切换时间框架
        function switchTimeframe(timeframe) {
            currentTimeframe = timeframe;
            
            // 更新按钮状态
            document.querySelectorAll('.controls .btn').forEach(btn => {
                btn.classList.remove('active');
                const text = btn.textContent.trim();
                if ((timeframe === '6h' && text === '6小时') ||
                    (timeframe === '1d' && text === '1天') ||
                    (timeframe === '3d' && text === '3天') ||
                    (timeframe === '7d' && text === '7天')) {
                    btn.classList.add('active');
                }
            });

            currentData = generateMockData(timeframe, currentPriceType);
            createCandlestickChart(currentData);
            createPriceChart(currentData);
            createIndicatorChart(currentData);
        }

        // 切换指标显示
        function toggleIndicator(indicator) {
            currentIndicators[indicator] = !currentIndicators[indicator];
            
            // 更新按钮状态
            event.target.classList.toggle('active');
            
            // 重新创建指标图
            createIndicatorChart(currentData);
        }

        // 更新价格信息
        function updatePriceInfo(candle) {
            const priceInfo = document.getElementById('priceInfo');
            const change = candle.close - candle.open;
            const changePercent = (change / candle.open * 100).toFixed(2);
            const timeStr = candle.date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const changeClass = change >= 0 ? '↑' : '↓';
            const changeSign = change >= 0 ? '+' : '';
            const priceUnit = currentPriceType === 'international' ? '¥/克' : 'USD/oz';
            
            priceInfo.textContent = `当前价格: ${changeSign}${candle.close.toFixed(2)} (${priceUnit}) | 涨跌: ${changeSign}${change.toFixed(2)} (${changeSign}${changePercent}%) ${changeClass} | 时间: ${timeStr}`;
        }

        // 初始化
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                // 加载初始数据
                currentData = generateMockData('1d', 'international');
                
                if (currentData && currentData.length > 0) {
                    createCandlestickChart(currentData);
                    createPriceChart(currentData);
                    createIndicatorChart(currentData);
                }
            }, 500);
        };

        // 处理窗口改变大小
        window.addEventListener('resize', () => {
            if (currentData && currentData.length > 0) {
                createCandlestickChart(currentData);
            }
        });
    </script>
</body>
</html>
