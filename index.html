<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>黄金价格走势图 - 黄金一周内走势</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }

        .btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chart-wrapper {
            position: relative;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .price-info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 黄金价格走势图</h1>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
        </div>

        <div id="content" style="display: none;">
            <div id="errorMessage"></div>

            <!-- K线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">K线图（蜡烛图）</div>
                <div class="controls">
                    <button class="btn" onclick="switchTimeframe('6h')">6小时</button>
                    <button class="btn active" onclick="switchTimeframe('1d')">1天</button>
                    <button class="btn" onclick="switchTimeframe('3d')">3天</button>
                    <button class="btn" onclick="switchTimeframe('7d')">7天</button>
                </div>
                <div class="chart-container">
                    <canvas id="candlestickChart"></canvas>
                </div>
            </div>

            <!-- 分析指标折线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">分析指标折线图</div>
                <div class="indicators">
                    <button class="btn active" onclick="toggleIndicator('ma5')">MA5</button>
                    <button class="btn active" onclick="toggleIndicator('ma10')">MA10</button>
                    <button class="btn active" onclick="toggleIndicator('ma20')">MA20</button>
                    <button class="btn" onclick="toggleIndicator('rsi')">RSI</button>
                </div>
                <div class="chart-container">
                    <canvas id="indicatorChart"></canvas>
                </div>
            </div>

            <div class="price-info" id="priceInfo">
                当前价格: $0.00 | 涨跌: +0.00% | 时间: --
            </div>
        </div>
    </div>

    <script>
        // 生成逼真的模拟数据
        function generateMockData(timeframe) {
            const now = new Date();
            const data = [];
            let basePrice = 2050 + Math.random() * 50;
            
            const intervals = {
                '6h': { points: 72, step: 5 * 60 * 1000 },
                '1d': { points: 288, step: 5 * 60 * 1000 },
                '3d': { points: 432, step: 10 * 60 * 1000 },
                '7d': { points: 672, step: 15 * 60 * 1000 }
            };
            
            const config = intervals[timeframe] || intervals['1d'];
            
            for (let i = config.points; i >= 0; i--) {
                const timestamp = now.getTime() - i * config.step;
                const date = new Date(timestamp);
                
                const randomWalk = (Math.random() - 0.5) * 2;
                const trend = (Math.random() - 0.5) * 0.3;
                const volatility = (Math.random() - 0.5) * 1.5;
                
                basePrice = basePrice + randomWalk + trend;
                
                const open = basePrice;
                const close = basePrice + volatility;
                const high = Math.max(open, close) + Math.abs(Math.random()) * 0.8;
                const low = Math.min(open, close) - Math.abs(Math.random()) * 0.8;
                
                data.push({
                    date: date,
                    timestamp: timestamp,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                    volume: Math.random() * 1000000
                });
            }
            
            return data;
        }

        // 计算移动平均线
        function calculateMA(data, period) {
            const ma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j].close;
                    }
                    ma.push(parseFloat((sum / period).toFixed(2)));
                }
            }
            return ma;
        }

        // 计算RSI
        function calculateRSI(data, period = 14) {
            const rsi = [];
            
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    rsi.push(null);
                } else {
                    let gains = 0;
                    let losses = 0;
                    
                    for (let j = 1; j <= period; j++) {
                        const change = data[i - j + 1].close - data[i - j].close;
                        if (change > 0) {
                            gains += change;
                        } else {
                            losses += Math.abs(change);
                        }
                    }
                    
                    const avgGain = gains / period;
                    const avgLoss = losses / period;
                    
                    if (avgLoss === 0) {
                        rsi.push(avgGain === 0 ? 50 : 100);
                    } else {
                        const rs = avgGain / avgLoss;
                        rsi.push(parseFloat((100 - (100 / (1 + rs))).toFixed(2)));
                    }
                }
            }
            
            return rsi;
        }

        let candlestickChart = null;
        let indicatorChart = null;
        let currentData = [];
        let currentTimeframe = '1d';
        let currentIndicators = {
            ma5: true,
            ma10: true,
            ma20: true,
            rsi: false
        };

        // 创建K线图 - 使用组合图表方式
        function createCandlestickChart(data) {
            const ctx = document.getElementById('candlestickChart');
            if (!ctx) return;
            
            if (candlestickChart) {
                candlestickChart.destroy();
            }

            // 准备标签和数据
            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            // 分离上涨和下跌
            const upData = [];
            const downData = [];
            
            for (let i = 0; i < data.length; i++) {
                const d = data[i];
                const isUp = d.close >= d.open;
                const o = d.open;
                const c = d.close;
                
                // 上涨：使用收盘价，下跌：使用收盘价
                if (isUp) {
                    upData.push(c);
                    downData.push(null);
                } else {
                    downData.push(c);
                    upData.push(null);
                }
            }

            candlestickChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '上涨蜡烛',
                            data: upData,
                            borderColor: 'rgba(255, 59, 48, 1)',
                            backgroundColor: 'rgba(255, 59, 48, 0.8)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: 'rgba(255, 59, 48, 1)',
                            pointBorderColor: 'rgba(255, 59, 48, 1)',
                            fill: false,
                            tension: 0,
                            showLine: false
                        },
                        {
                            label: '下跌蜡烛',
                            data: downData,
                            borderColor: 'rgba(76, 175, 80, 1)',
                            backgroundColor: 'rgba(76, 175, 80, 0.8)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: 'rgba(76, 175, 80, 1)',
                            pointBorderColor: 'rgba(76, 175, 80, 1)',
                            fill: false,
                            tension: 0,
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            enabled: true,
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    if (context.raw === null) return '';
                                    const idx = context.dataIndex;
                                    const d = data[idx];
                                    return `开: $${d.open.toFixed(2)} 高: $${d.high.toFixed(2)} 低: $${d.low.toFixed(2)} 收: $${d.close.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '价格 (USD/oz)'
                            }
                        }
                    }
                }
            });

            updatePriceInfo(data[data.length - 1]);
        }

        // 创建指标折线图
        function createIndicatorChart(data) {
            const ctx = document.getElementById('indicatorChart');
            if (!ctx) return;
            
            if (indicatorChart) {
                indicatorChart.destroy();
            }

            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            const datasets = [];
            const colors = {
                ma5: { border: 'rgba(59, 130, 246, 1)', bg: 'rgba(59, 130, 246, 0.1)' },
                ma10: { border: 'rgba(249, 115, 22, 1)', bg: 'rgba(249, 115, 22, 0.1)' },
                ma20: { border: 'rgba(168, 85, 247, 1)', bg: 'rgba(168, 85, 247, 0.1)' },
                rsi: { border: 'rgba(236, 72, 153, 1)', bg: 'rgba(236, 72, 153, 0.1)' }
            };

            // 确保至少有一个数据集（MA5）
            if (currentIndicators.ma5) {
                const ma5 = calculateMA(data, 5);
                datasets.push({
                    label: 'MA5',
                    data: ma5,
                    borderColor: colors.ma5.border,
                    backgroundColor: colors.ma5.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma5.border,
                    pointBorderColor: colors.ma5.border
                });
            }

            if (currentIndicators.ma10) {
                const ma10 = calculateMA(data, 10);
                datasets.push({
                    label: 'MA10',
                    data: ma10,
                    borderColor: colors.ma10.border,
                    backgroundColor: colors.ma10.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma10.border,
                    pointBorderColor: colors.ma10.border
                });
            }

            if (currentIndicators.ma20) {
                const ma20 = calculateMA(data, 20);
                datasets.push({
                    label: 'MA20',
                    data: ma20,
                    borderColor: colors.ma20.border,
                    backgroundColor: colors.ma20.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma20.border,
                    pointBorderColor: colors.ma20.border
                });
            }

            if (currentIndicators.rsi) {
                const rsi = calculateRSI(data, 14);
                datasets.push({
                    label: 'RSI (右轴)',
                    data: rsi,
                    borderColor: colors.rsi.border,
                    backgroundColor: colors.rsi.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.rsi.border,
                    pointBorderColor: colors.rsi.border,
                    yAxisID: 'y1'
                });
            }

            indicatorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    if (context.raw === null) return '';
                                    if (context.dataset.label.includes('RSI')) {
                                        return `${context.dataset.label}: ${context.raw.toFixed(2)}`;
                                    }
                                    return `${context.dataset.label}: $${context.raw.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '价格 (USD/oz)'
                            },
                            beginAtZero: false
                        },
                        y1: {
                            type: 'linear',
                            display: currentIndicators.rsi,
                            position: 'right',
                            title: {
                                display: currentIndicators.rsi,
                                text: 'RSI'
                            },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }

        // 切换时间框架
        async function switchTimeframe(timeframe) {
            currentTimeframe = timeframe;
            
            // 更新按钮状态
            document.querySelectorAll('.controls .btn').forEach(btn => {
                btn.classList.remove('active');
                const text = btn.textContent.trim();
                if ((timeframe === '6h' && text === '6小时') ||
                    (timeframe === '1d' && text === '1天') ||
                    (timeframe === '3d' && text === '3天') ||
                    (timeframe === '7d' && text === '7天')) {
                    btn.classList.add('active');
                }
            });

            currentData = generateMockData(timeframe);
            createCandlestickChart(currentData);
            createIndicatorChart(currentData);
        }

        // 切换指标显示
        function toggleIndicator(indicator) {
            currentIndicators[indicator] = !currentIndicators[indicator];
            
            // 更新按钮状态
            event.target.classList.toggle('active');
            
            // 重新创建指标图
            createIndicatorChart(currentData);
        }

        // 更新价格信息
        function updatePriceInfo(candle) {
            const priceInfo = document.getElementById('priceInfo');
            const change = candle.close - candle.open;
            const changePercent = (change / candle.open * 100).toFixed(2);
            const timeStr = candle.date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const changeClass = change >= 0 ? '↑' : '↓';
            const changeSign = change >= 0 ? '+' : '';
            
            priceInfo.textContent = `当前价格: $${candle.close.toFixed(2)} | 涨跌: ${changeSign}${change.toFixed(2)} (${changeSign}${changePercent}%) ${changeClass} | 时间: ${timeStr}`;
        }

        // 初始化
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                // 加载初始数据
                currentData = generateMockData('1d');
                
                if (currentData && currentData.length > 0) {
                    createCandlestickChart(currentData);
                    createIndicatorChart(currentData);
                }
            }, 500);
        };
    </script>
</body>
</html>
