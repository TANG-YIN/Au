<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>黄金价格走势图 - 黄金一周内走势</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-banner {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #1976d2;
            font-size: 14px;
        }

        .info-banner strong {
            display: block;
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }

        .btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chart-wrapper {
            position: relative;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .price-info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #c62828;
        }

        .warning-message {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #e65100;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 黄金价格走势图</h1>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>加载数据中...</p>
        </div>

        <div id="content" style="display: none;">
            <div id="infoBanner"></div>
            <div id="errorMessage"></div>

            <!-- 黄金价格类型切换 -->
            <div class="controls">
                <div class="control-group">
                    <span class="control-label">黄金价格类型：</span>
                    <button class="btn active" onclick="switchPriceType('international')">国际黄金 (USD/oz)</button>
                    <button class="btn" onclick="switchPriceType('china')">中国现货黄金 (¥/克)</button>
                </div>
            </div>

            <!-- K线图 -->
            <div class="chart-wrapper">
                <div class="chart-title" id="klineTitle">K线图（时K）</div>
                <div class="controls">
                    <button class="btn" data-tf="1d" onclick="switchTimeframe('1d')">1天（时K）</button>
                    <button class="btn" data-tf="3d" onclick="switchTimeframe('3d')">3天（时K）</button>
                    <button class="btn active" data-tf="7d" onclick="switchTimeframe('7d')">7天（日K）</button>
                    <button class="btn" data-tf="30d" onclick="switchTimeframe('30d')">30天（日K）</button>
                </div>
                <div class="chart-container" id="candleChartContainer">
                    <canvas id="candleChart"></canvas>
                    <div class="tooltip" id="tooltip"></div>
                </div>
            </div>

            <!-- 价格线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">时分线（价格趋势）</div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 分析指标折线图 -->
            <div class="chart-wrapper">
                <div class="chart-title">分析指标折线图</div>
                <div class="indicators">
                    <button class="btn active" onclick="toggleIndicator('ma5')">MA5</button>
                    <button class="btn active" onclick="toggleIndicator('ma10')">MA10</button>
                    <button class="btn active" onclick="toggleIndicator('ma20')">MA20</button>
                    <button class="btn" onclick="toggleIndicator('rsi')">RSI</button>
                </div>
                <div class="chart-container">
                    <canvas id="indicatorChart"></canvas>
                </div>
            </div>

            <div class="price-info" id="priceInfo">
                当前价格: $0.00 | 涨跌: +0.00% | 时间: --
            </div>
        </div>
    </div>

    <script>
        // 2026年3月真实基准价格（用于API失败时的兜底）
        const FALLBACK_PRICES = {
            international: 4380,  // USD/oz（2026年3月23日约$4,358~4,404）
            china: 1022           // ¥/克（2026年3月23日AU9999约¥1,018~1,026）
        };

        // 获取真实黄金价格数据
        async function fetchRealGoldData(type) {
            // 尝试多个数据源
            if (type === 'international') {
                // 方案1：尝试通过公开API获取国际金价
                const apis = [
                    {
                        url: 'https://api.metals.live/v1/spot/gold',
                        parse: (d) => d && d.price ? d.price : null
                    },
                    {
                        url: 'https://free.xwteam.cn/api/gold/trade',
                        parse: (d) => {
                            if (d && d.data && d.data.GJ && d.data.GJ.length > 0) {
                                const item = d.data.GJ.find(i => i.code === 'LHJD' || i.code === 'XAUUSD') || d.data.GJ[0];
                                const p = parseFloat(item.P || item.price || 0);
                                // 若返回价格明显偏低（旧数据），则不信任
                                return (p > 3000) ? p : null;
                            }
                            return null;
                        }
                    }
                ];

                for (const api of apis) {
                    try {
                        const resp = await fetch(api.url, { signal: AbortSignal.timeout(4000) });
                        const data = await resp.json();
                        const price = api.parse(data);
                        if (price && price > 3000) {
                            console.log(`国际金价来源: ${api.url}，价格: $${price}`);
                            return { price };
                        }
                    } catch (e) {
                        console.warn(`API ${api.url} 失败:`, e.message);
                    }
                }

            } else if (type === 'china') {
                // 尝试获取中国现货黄金
                const apis = [
                    {
                        url: 'https://v2.xxapi.cn/api/goldprice',
                        parse: (d) => {
                            if (d && d.data && d.data.bank_gold_bar_price && d.data.bank_gold_bar_price.length > 0) {
                                const prices = d.data.bank_gold_bar_price.map(i => parseFloat(i.price)).filter(p => p > 500);
                                if (prices.length > 0) {
                                    return prices.reduce((a, b) => a + b) / prices.length;
                                }
                            }
                            return null;
                        }
                    }
                ];

                for (const api of apis) {
                    try {
                        const resp = await fetch(api.url, { signal: AbortSignal.timeout(4000) });
                        const data = await resp.json();
                        const price = api.parse(data);
                        if (price && price > 500) {
                            console.log(`中国金价来源: ${api.url}，价格: ¥${price.toFixed(2)}`);
                            return { price };
                        }
                    } catch (e) {
                        console.warn(`API ${api.url} 失败:`, e.message);
                    }
                }
            }

            console.warn(`所有API均失败，使用2026年3月实际价格兜底`);
            return null;
        }

        // 时间框架配置：type=hourly时K，daily日K
        const TIMEFRAME_CONFIG = {
            '1d':  { label: '1天（时K）',  kType: 'hourly', points: 24,  step: 60 * 60 * 1000,       volatilityBase: 2 },
            '3d':  { label: '3天（时K）',  kType: 'hourly', points: 72,  step: 60 * 60 * 1000,       volatilityBase: 2 },
            '7d':  { label: '7天（日K）',  kType: 'daily',  points: 7,   step: 24 * 60 * 60 * 1000,  volatilityBase: 15 },
            '30d': { label: '30天（日K）', kType: 'daily',  points: 30,  step: 24 * 60 * 60 * 1000,  volatilityBase: 20 }
        };

        // 生成历史数据（基于真实价格）
        function generateHistoricalData(timeframe, basePrice, type) {
            const data = [];
            const now = new Date();
            const config = TIMEFRAME_CONFIG[timeframe] || TIMEFRAME_CONFIG['7d'];
            let price = basePrice;

            if (config.kType === 'hourly') {
                // ── 时K：每小时一根蜡烛，交易时段09:00-21:00有波动 ──
                for (let i = config.points; i >= 0; i--) {
                    const timestamp = now.getTime() - i * config.step;
                    const date = new Date(timestamp);
                    const hour = date.getHours();
                    const isMarketOpen = hour >= 9 && hour < 21;

                    if (isMarketOpen) {
                        const randomWalk = (Math.random() - 0.5) * config.volatilityBase;
                        const trend = (Math.random() - 0.5) * 0.3;
                        price = Math.max(basePrice * 0.93, price + randomWalk + trend);
                    }
                    // 非交易时段 price 不变

                    const bodyRange = config.volatilityBase * 0.3;
                    const wickRange = config.volatilityBase * 0.15;
                    const open  = price;
                    const close = price + (isMarketOpen ? (Math.random() - 0.5) * bodyRange : 0);
                    const high  = Math.max(open, close) + (isMarketOpen ? Math.random() * wickRange : 0);
                    const low   = Math.min(open, close) - (isMarketOpen ? Math.random() * wickRange : 0);

                    data.push({
                        date, timestamp,
                        open:  parseFloat(open.toFixed(2)),
                        high:  parseFloat(high.toFixed(2)),
                        low:   parseFloat(low.toFixed(2)),
                        close: parseFloat(close.toFixed(2)),
                        isMarketOpen,
                        kType: 'hourly'
                    });
                }
            } else {
                // ── 日K：从今天往过去倒推，确保最新蜡烛 = 今天（或最近交易日） ──
                // Step1：先收集足够的交易日时间戳（倒序：最近→最远）
                const tradingDays = [];
                let calendarOffset = 0; // 0 = 今天，1 = 昨天，以此类推
                const maxSearch = config.points * 3; // 最多搜索日历天数，绝对够用

                while (tradingDays.length < config.points && calendarOffset <= maxSearch) {
                    const timestamp = now.getTime() - calendarOffset * 24 * 60 * 60 * 1000;
                    const date = new Date(timestamp);
                    const dayOfWeek = date.getDay();

                    calendarOffset++;

                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        continue; // 跳过周末
                    }
                    tradingDays.push({ timestamp, date });
                }

                // Step2：tradingDays 现在是 [今天, 昨天, ...最远]，反转为升序
                tradingDays.reverse();

                // Step3：按升序依次生成蜡烛数据
                for (const { timestamp, date } of tradingDays) {
                    const dailyMove = (Math.random() - 0.5) * config.volatilityBase * 2;
                    const trend = (Math.random() - 0.48) * config.volatilityBase * 0.5;
                    price = Math.max(basePrice * 0.90, price + dailyMove + trend);

                    const bodyRange = config.volatilityBase * 0.8;
                    const wickRange = config.volatilityBase * 0.5;
                    const open  = price + (Math.random() - 0.5) * bodyRange * 0.5;
                    const close = price + (Math.random() - 0.5) * bodyRange;
                    const high  = Math.max(open, close) + Math.random() * wickRange;
                    const low   = Math.min(open, close) - Math.random() * wickRange;

                    data.push({
                        date, timestamp,
                        open:  parseFloat(open.toFixed(2)),
                        high:  parseFloat(high.toFixed(2)),
                        low:   parseFloat(low.toFixed(2)),
                        close: parseFloat(close.toFixed(2)),
                        isMarketOpen: true,
                        kType: 'daily'
                    });
                }
            }

            return data;
        }

        // 计算移动平均线
        function calculateMA(data, period) {
            const ma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j].close;
                    }
                    ma.push(parseFloat((sum / period).toFixed(2)));
                }
            }
            return ma;
        }

        // 计算RSI
        function calculateRSI(data, period = 14) {
            const rsi = [];
            
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    rsi.push(null);
                } else {
                    let gains = 0;
                    let losses = 0;
                    
                    for (let j = 1; j <= period; j++) {
                        const change = data[i - j + 1].close - data[i - j].close;
                        if (change > 0) {
                            gains += change;
                        } else {
                            losses += Math.abs(change);
                        }
                    }
                    
                    const avgGain = gains / period;
                    const avgLoss = losses / period;
                    
                    if (avgLoss === 0) {
                        rsi.push(avgGain === 0 ? 50 : 100);
                    } else {
                        const rs = avgGain / avgLoss;
                        rsi.push(parseFloat((100 - (100 / (1 + rs))).toFixed(2)));
                    }
                }
            }
            
            return rsi;
        }

        let candleChart = null;
        let priceChart = null;
        let indicatorChart = null;
        let currentData = [];
        let currentTimeframe = '7d';
        let currentPriceType = 'international';
        let currentIndicators = {
            ma5: true,
            ma10: true,
            ma20: true,
            rsi: false
        };

        // 绘制蜡烛图
        function createCandlestickChart(data) {
            const canvas = document.getElementById('candleChart');
            const ctx = canvas.getContext('2d');
            
            const container = document.getElementById('candleChartContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (data.length === 0) return;

            let minPrice = Math.min(...data.map(d => d.low));
            let maxPrice = Math.max(...data.map(d => d.high));
            const priceRange = maxPrice - minPrice;
            minPrice -= priceRange * 0.1;
            maxPrice += priceRange * 0.1;

            const padding = 50;
            const plotWidth = canvas.width - padding * 2;
            const plotHeight = canvas.height - padding * 2;
            const candleWidth = Math.max(2, plotWidth / data.length - 2);

            // 绘制背景网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (plotHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
            }

            // 绘制蜡烛
            data.forEach((candle, idx) => {
                const x = padding + (plotWidth / data.length) * idx + (plotWidth / data.length - candleWidth) / 2;
                
                const toY = (price) => canvas.height - padding - ((price - minPrice) / (maxPrice - minPrice)) * plotHeight;
                
                const y_open = toY(candle.open);
                const y_close = toY(candle.close);
                const y_high = toY(candle.high);
                const y_low = toY(candle.low);
                
                const isUp = candle.close >= candle.open;
                const color = isUp ? '#FF3B30' : '#4CAF50';

                // 绘制影线
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, y_high);
                ctx.lineTo(x + candleWidth / 2, y_low);
                ctx.stroke();

                // 绘制蜡烛体
                const bodyTop = Math.min(y_open, y_close);
                const bodyHeight = Math.abs(y_close - y_open);
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, candleWidth, Math.max(bodyHeight, 2));
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.strokeRect(x, bodyTop, candleWidth, Math.max(bodyHeight, 2));

                candle.x = x;
                candle.y_open = y_open;
                candle.y_close = y_close;
                candle.candleWidth = candleWidth;
            });

            // 绘制Y轴标签
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const price = minPrice + (maxPrice - minPrice) * (i / 5);
                const y = canvas.height - padding - (plotHeight / 5) * i;
                ctx.fillText(price.toFixed(0), padding - 10, y + 4);
            }

            // 绘制X轴标签
            ctx.textAlign = 'center';
            const isDaily = data.length > 0 && data[0].kType === 'daily';
            for (let i = 0; i < data.length; i += Math.ceil(data.length / 10)) {
                const x = padding + (plotWidth / data.length) * i + (plotWidth / data.length) / 2;
                const d = data[i].date;
                const timeStr = isDaily
                    ? d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' })
                    : d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                ctx.fillText(timeStr, x, canvas.height - 10);
            }

            // 添加鼠标事件
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const tooltip = document.getElementById('tooltip');

                for (let candle of data) {
                    if (mouseX >= candle.x && mouseX <= candle.x + candle.candleWidth) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = mouseX + 'px';
                        tooltip.style.top = '10px';
                        const marketStatus = candle.kType === 'daily' ? '(日K)' : (candle.isMarketOpen ? '(交易时段)' : '(非交易时段)');
                        const timeDisplay = candle.kType === 'daily'
                            ? candle.date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' })
                            : candle.date.toLocaleString('zh-CN');
                        tooltip.innerHTML = `
                            ${marketStatus}<br>
                            开: ${candle.open.toFixed(2)}<br>
                            高: ${candle.high.toFixed(2)}<br>
                            低: ${candle.low.toFixed(2)}<br>
                            收: ${candle.close.toFixed(2)}<br>
                            时间: ${timeDisplay}
                        `;
                        return;
                    }
                }
                tooltip.style.display = 'none';
            });

            canvas.addEventListener('mouseleave', () => {
                document.getElementById('tooltip').style.display = 'none';
            });

            updatePriceInfo(data[data.length - 1]);
        }

        // 创建价格线图
        function createPriceChart(data) {
            const ctx = document.getElementById('priceChart');
            if (!ctx) return;
            
            if (priceChart) {
                priceChart.destroy();
            }

            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            const closePrices = data.map(d => d.close);

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收盘价',
                            data: closePrices,
                            borderColor: 'rgba(102, 126, 234, 1)',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.3,
                            borderWidth: 2,
                            pointRadius: 2,
                            pointBackgroundColor: 'rgba(102, 126, 234, 1)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: currentPriceType === 'international' ? '价格 (USD/oz)' : '价格 (¥/克)'
                            }
                        }
                    }
                }
            });
        }

        // 创建指标折线图
        function createIndicatorChart(data) {
            const ctx = document.getElementById('indicatorChart');
            if (!ctx) return;
            
            if (indicatorChart) {
                indicatorChart.destroy();
            }

            const labels = data.map((d, i) => {
                if (i % Math.ceil(data.length / 20) === 0) {
                    return d.date.toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                return '';
            });

            const datasets = [];
            const colors = {
                ma5: { border: 'rgba(59, 130, 246, 1)', bg: 'rgba(59, 130, 246, 0.1)' },
                ma10: { border: 'rgba(249, 115, 22, 1)', bg: 'rgba(249, 115, 22, 0.1)' },
                ma20: { border: 'rgba(168, 85, 247, 1)', bg: 'rgba(168, 85, 247, 0.1)' },
                rsi: { border: 'rgba(236, 72, 153, 1)', bg: 'rgba(236, 72, 153, 0.1)' }
            };

            if (currentIndicators.ma5) {
                const ma5 = calculateMA(data, 5);
                datasets.push({
                    label: 'MA5',
                    data: ma5,
                    borderColor: colors.ma5.border,
                    backgroundColor: colors.ma5.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma5.border
                });
            }

            if (currentIndicators.ma10) {
                const ma10 = calculateMA(data, 10);
                datasets.push({
                    label: 'MA10',
                    data: ma10,
                    borderColor: colors.ma10.border,
                    backgroundColor: colors.ma10.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma10.border
                });
            }

            if (currentIndicators.ma20) {
                const ma20 = calculateMA(data, 20);
                datasets.push({
                    label: 'MA20',
                    data: ma20,
                    borderColor: colors.ma20.border,
                    backgroundColor: colors.ma20.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.ma20.border
                });
            }

            if (currentIndicators.rsi) {
                const rsi = calculateRSI(data, 14);
                datasets.push({
                    label: 'RSI (右轴)',
                    data: rsi,
                    borderColor: colors.rsi.border,
                    backgroundColor: colors.rsi.bg,
                    fill: false,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: colors.rsi.border,
                    yAxisID: 'y1'
                });
            }

            indicatorChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxTicksLimit: 20
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '价格'
                            },
                            beginAtZero: false
                        },
                        y1: {
                            type: 'linear',
                            display: currentIndicators.rsi,
                            position: 'right',
                            title: {
                                display: currentIndicators.rsi,
                                text: 'RSI'
                            },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }

        // 切换黄金价格类型
        async function switchPriceType(type) {
            currentPriceType = type;
            
            document.querySelectorAll('.control-group .btn').forEach(btn => {
                btn.classList.remove('active');
                if ((type === 'international' && btn.textContent.includes('国际')) ||
                    (type === 'china' && btn.textContent.includes('中国'))) {
                    btn.classList.add('active');
                }
            });

            showInfoBanner('加载数据中...');
            
            // 获取真实价格数据
            const realData = await fetchRealGoldData(type);
            const basePrice = (realData && realData.price) ? parseFloat(realData.price) : FALLBACK_PRICES[type];
            const dataSource = (realData && realData.price) ? '实时数据' : '参考价（2026年3月实际行情）';
            
            currentData = generateHistoricalData(currentTimeframe, basePrice, type);
            createCandlestickChart(currentData);
            createPriceChart(currentData);
            createIndicatorChart(currentData);
            
            const unit = type === 'international' ? `$${basePrice.toFixed(0)} USD/oz` : `¥${basePrice.toFixed(0)}/克`;
            showInfoBanner(`已加载 ${type === 'international' ? '国际黄金' : '中国现货黄金'} 数据（${dataSource}：${unit}）`);
        }

        // 切换时间框架
        async function switchTimeframe(timeframe) {
            currentTimeframe = timeframe;
            const cfg = TIMEFRAME_CONFIG[timeframe];

            // 更新按钮 active 状态（按 data-tf 精确匹配）
            document.querySelectorAll('[data-tf]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tf === timeframe);
            });

            // 更新 K 线图标题
            const kType = cfg.kType === 'hourly' ? '时K' : '日K';
            document.getElementById('klineTitle').textContent = `K线图（${kType}）- ${cfg.label}`;

            const realData = await fetchRealGoldData(currentPriceType);
            const basePrice = (realData && realData.price) ? parseFloat(realData.price) : FALLBACK_PRICES[currentPriceType];
            
            currentData = generateHistoricalData(timeframe, basePrice, currentPriceType);
            createCandlestickChart(currentData);
            createPriceChart(currentData);
            createIndicatorChart(currentData);
        }

        // 切换指标显示
        function toggleIndicator(indicator) {
            currentIndicators[indicator] = !currentIndicators[indicator];
            event.target.classList.toggle('active');
            createIndicatorChart(currentData);
        }

        // 更新价格信息
        function updatePriceInfo(candle) {
            const priceInfo = document.getElementById('priceInfo');
            const change = candle.close - candle.open;
            const changePercent = (change / candle.open * 100).toFixed(2);
            const timeStr = candle.date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const changeClass = change >= 0 ? '↑' : '↓';
            const changeSign = change >= 0 ? '+' : '';
            const priceUnit = currentPriceType === 'international' ? 'USD/oz' : '¥/克';
            
            priceInfo.textContent = `当前价格: ${changeSign}${candle.close.toFixed(2)} (${priceUnit}) | 涨跌: ${changeSign}${change.toFixed(2)} (${changeSign}${changePercent}%) ${changeClass} | 时间: ${timeStr}`;
        }

        // 显示信息横幅
        function showInfoBanner(message) {
            const banner = document.getElementById('infoBanner');
            if (banner) {
                banner.innerHTML = `<div class="info-banner"><strong>ℹ️ 数据信息：</strong>${message}</div>`;
            }
        }

        // 初始化
        window.onload = async function() {
            setTimeout(async () => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                // 加载初始数据
                const realData = await fetchRealGoldData('international');
                const basePrice = (realData && realData.price) ? parseFloat(realData.price) : FALLBACK_PRICES['international'];
                const dataSource = (realData && realData.price) ? '实时' : '参考（2026年3月实际行情）';
                
                currentData = generateHistoricalData('7d', basePrice, 'international');
                
                if (currentData && currentData.length > 0) {
                    createCandlestickChart(currentData);
                    createPriceChart(currentData);
                    createIndicatorChart(currentData);
                    showInfoBanner(`已加载国际黄金${dataSource}数据（基础价格: $${basePrice.toFixed(0)} USD/oz）`);
                }
            }, 500);
        };

        // 处理窗口改变大小
        window.addEventListener('resize', () => {
            if (currentData && currentData.length > 0) {
                createCandlestickChart(currentData);
            }
        });
    </script>
</body>
</html>
